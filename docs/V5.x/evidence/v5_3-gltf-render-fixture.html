<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>V5.3 GLTF Render Fixture</title>
  <style>
    body { margin: 0; background: #f8fafc; font-family: Inter, system-ui, sans-serif; color: #18212f; }
    main { padding: 24px; }
    canvas { width: 320px; height: 320px; border: 1px solid #dbe3ee; background: transparent; }
    #status { font-size: 14px; margin-top: 12px; }
  </style>
  <script type="importmap">
    {
      "imports": {
        "three": "/node_modules/three/build/three.module.js",
        "three/examples/jsm/loaders/GLTFLoader.js": "/node_modules/three/examples/jsm/loaders/GLTFLoader.js"
      }
    }
  </script>
</head>
<body>
  <main>
    <h1>V5.3 GLTF Render Fixture</h1>
    <canvas id="stage" width="320" height="320"></canvas>
    <p id="status">loading</p>
  </main>
  <script type="module">
    import * as THREE from "three";
    import { GLTFLoader } from "three/examples/jsm/loaders/GLTFLoader.js";

    const canvas = document.querySelector("#stage");
    const status = document.querySelector("#status");
    const renderer = new THREE.WebGLRenderer({ canvas, alpha: true, antialias: true, preserveDrawingBuffer: true });
    renderer.setSize(320, 320, false);
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(35, 1, 0.1, 20);
    camera.position.set(0, -5, 2.2);
    camera.lookAt(0, 0, 1);
    scene.add(new THREE.HemisphereLight(0xffffff, 0x99aabb, 2.2));

    new GLTFLoader().load("/apps/desktop/public/assets/3d/agent-desktop-pet-cat-prototype.glb", (gltf) => {
      gltf.scene.rotation.x = Math.PI / 2;
      scene.add(gltf.scene);
      renderer.render(scene, camera);
      const pixels = new Uint8Array(4);
      renderer.getContext().readPixels(160, 160, 1, 1, renderer.getContext().RGBA, renderer.getContext().UNSIGNED_BYTE, pixels);
      status.textContent = `loaded idle pixels=${Array.from(pixels).join(",")}`;
      document.body.dataset.renderStatus = "passed";
    }, undefined, (error) => {
      status.textContent = `failed ${error?.message || "unknown"}`;
      document.body.dataset.renderStatus = "failed";
    });
  </script>
</body>
</html>
