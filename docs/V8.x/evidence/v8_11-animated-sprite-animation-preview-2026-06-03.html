  <script>
    const images = [...document.querySelectorAll('img[data-frames]')];
    let index = 0;
    setInterval(() => {
      index += 1;
      for (const img of images) {
        const frames = img.dataset.frames.split('|');
        img.src = frames[index % frames.length];
      }
    }, 125);
  </script>
